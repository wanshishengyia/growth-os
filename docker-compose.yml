version: "3.9"

services:
  backend:
    build: .
    container_name: growth-os-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: growth-os-n8n
    ports:
      - "5678:5678"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  n8n_data:
